# SonarCloud configuration
# Adjust the following two values if your SonarCloud org or key differs
sonar.organization=cleanshipcz
sonar.projectKey=cleanshipcz_bootstrap-kotlin
sonar.host.url=https://sonarcloud.io
sonar.sourceEncoding=UTF-8

# Source and test configuration for a Gradle multi-module Kotlin project
# Analyze everything under the repo except common noise and build outputs
sonar.sources=.
sonar.exclusions=**/build/**,**/.gradle/**,build-logic/**,**/*.md,**/*.MD,**/*.png,**/*.jpg,**/*.jpeg,**/*.yml,**/*.yaml,**/*.json

# Explicitly mark tests and their locations
sonar.tests=.
sonar.test.inclusions=**/src/test/**

# Kotlin: import Detekt and KtLint results
# Detekt XML reports produced by the convention plugin
sonar.kotlin.detekt.reportPaths=**/build/reports/detekt/detekt.xml
# KtLint Checkstyle reports (multiple per module/source set) produced by the convention plugin
sonar.kotlin.ktlint.reportPaths=**/build/reports/ktlint/**/*.xml

# Coverage and test reports
# JaCoCo XML reports produced by jacocoTestReport in each module
sonar.coverage.jacoco.xmlReportPaths=**/build/reports/jacoco/test/jacocoTestReport.xml
# JUnit XML reports (SonarCloud uses them for test counts)
sonar.junit.reportPaths=**/build/test-results/test

# Optional: reduce noise from duplicated code in tests and generated code
sonar.cpd.exclusions=**/src/test/**,**/generated/**
